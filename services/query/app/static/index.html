<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura RAG Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f12;
            --bg-panel: #13161b;
            --bg-input: #1a1e25;
            --bg-hover: #1f2430;
            --border: #252b36;
            --border-hi: #2e3747;
            --accent: #4fa3e8;
            --accent-dim: #1e3d5c;
            --purple: #9b7fe8;
            --purple-dim: #2a1f4a;
            --green: #4ecf8a;
            --muted: #4a5568;
            --text: #c9d1d9;
            --text-dim: #6b7a8f;
            --text-bright: #e6edf3;
            --radius: 6px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        header h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-bright);
            letter-spacing: 0.05em;
        }

        .header-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .upload-btn {
            background: transparent;
            border: 1px solid var(--border-hi);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
        }

        .upload-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--bg-hover);
        }

        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            padding-left: 12px;
            border-left: 1px solid var(--border);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2.4s ease-in-out infinite;
            transition: background 0.4s, box-shadow 0.4s;
        }

        .status-dot.checking {
            background: var(--muted);
            box-shadow: none;
            animation: pulse 0.8s ease-in-out infinite;
        }

        .status-dot.offline {
            background: #f28b82;
            box-shadow: 0 0 6px #f28b82;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── Chat area ── */
        #chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeSlide 0.2s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 0 2px;
        }

        .user-msg .msg-label {
            color: var(--accent);
        }

        .ai-msg .msg-label {
            color: var(--purple);
        }

        .msg-body {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.7;
            font-size: 14px;
        }

        .user-msg .msg-body {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-bright);
        }

        .ai-msg .msg-body {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text);
            position: relative;
        }

        /* ── Sources at bottom of response ── */
        .sources-footer {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sources-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .source-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-hi);
            border-radius: 4px;
            padding: 5px 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            margin-right: 6px;
            margin-bottom: 4px;
        }

        .source-chip .chip-name {
            color: var(--accent);
        }

        .source-chip .chip-score {
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 3px;
            padding: 1px 6px;
            font-size: 10px;
        }

        /* ── Error ── */
        .error-msg {
            color: #f28b82;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        /* ── Input bar ── */
        .input-bar {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 24px 24px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--bg-input);
            border: 1px solid var(--border-hi);
            border-radius: 8px;
            transition: border-color 0.15s;
        }

        .input-wrap:focus-within {
            border-color: var(--accent);
        }

        .input-prefix {
            padding: 0 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            color: var(--accent);
            user-select: none;
        }

        input[type="text"] {
            flex: 1;
            padding: 13px 0;
            background: transparent;
            border: none;
            color: var(--text-bright);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        button#send-btn {
            margin: 5px;
            padding: 8px 18px;
            background: var(--accent);
            color: #0d0f12;
            border: none;
            border-radius: 5px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        button#send-btn:hover {
            background: #72bbf5;
        }

        button#send-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* ── Thinking cursor ── */
        .cursor {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: var(--purple);
            border-radius: 1px;
            vertical-align: middle;
            margin-left: 3px;
            animation: blink 0.9s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-hi);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-mark">
            <svg viewBox="0 0 16 16">
                <path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" />
            </svg>
        </div>
        <h1>AURA</h1>

        <div class="header-controls">
            <!-- Hidden file input restricted to .txt -->
            <input type="file" id="doc-upload" accept=".txt" style="display: none;" onchange="handleFileUpload(event)">
            <button id="upload-btn" class="upload-btn" onclick="document.getElementById('doc-upload').click()">+ ADD
                .TXT</button>

            <div class="status-pill">
                <span class="status-dot checking" id="status-dot"></span>
                <span id="status-label">checking…</span>
            </div>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-bar">
        <div class="input-wrap">
            <span class="input-prefix">&gt;</span>
            <input type="text" id="query-input" placeholder="Ask a question about the uploaded documents…"
                onkeypress="if(event.key === 'Enter') sendQuery()">
            <button id="send-btn" onclick="sendQuery()">RUN</button>
        </div>
    </div>

    <script>
        // ── File Upload Logic ──────────────────────────────────────────
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const uploadBtn = document.getElementById('upload-btn');
            const originalText = uploadBtn.textContent;

            uploadBtn.textContent = 'UPLOADING...';
            uploadBtn.disabled = true;

            const formData = new FormData();
            formData.append('document', file);

            try {
                const response = await fetch('http://localhost:8080/document', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                uploadBtn.textContent = 'UPLOADED ✓';
                uploadBtn.style.color = 'var(--green)';
                uploadBtn.style.borderColor = 'var(--green)';

            } catch (err) {
                console.error('Upload failed:', err);
                uploadBtn.textContent = 'FAILED ✗';
                uploadBtn.style.color = '#f28b82';
                uploadBtn.style.borderColor = '#f28b82';
            } finally {
                // Reset styling and text after 2.5 seconds
                setTimeout(() => {
                    uploadBtn.textContent = originalText;
                    uploadBtn.disabled = false;
                    uploadBtn.style.color = '';
                    uploadBtn.style.borderColor = '';
                }, 2500);

                // Clear the input so the same file can be selected again if needed
                event.target.value = '';
            }
        }

        // ── Chat Logic ─────────────────────────────────────────────────
        async function sendQuery() {
            const inputEl = document.getElementById('query-input');
            const buttonEl = document.getElementById('send-btn');
            const chat = document.getElementById('chat-container');
            const query = inputEl.value.trim();
            if (!query) return;

            inputEl.value = '';
            buttonEl.disabled = true;

            // User bubble
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerHTML = `<span class="msg-label">you</span><div class="msg-body">${escapeHtml(query)}</div>`;
            chat.appendChild(userDiv);

            // AI bubble
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            const aiBody = document.createElement('div');
            aiBody.className = 'msg-body';

            const textSpan = document.createElement('span');
            textSpan.id = 'stream-text';

            const cursor = document.createElement('span');
            cursor.className = 'cursor';

            aiBody.appendChild(textSpan);
            aiBody.appendChild(cursor);
            aiDiv.innerHTML = '<span class="msg-label">aura</span>';
            aiDiv.appendChild(aiBody);
            chat.appendChild(aiDiv);
            scrollBottom();

            // Collected sources (populated from SSE before streaming text)
            let pendingSources = [];

            try {
                const response = await fetch('/api/v1/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, top_k: 5 })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const payload = JSON.parse(line.slice(6));

                            if (payload.type === 'sources') {
                                pendingSources = payload.data || [];
                            }
                            else if (payload.type === 'token') {
                                textSpan.innerHTML += payload.data.replace(/\n/g, '<br>');
                                scrollBottom();
                            }
                            else if (payload.type === 'error') {
                                textSpan.innerHTML += `<br><span class="error-msg">[error: ${escapeHtml(payload.data)}]</span>`;
                            }
                        } catch (e) {
                            console.error('Parse error:', e);
                        }
                    }
                }

                // Stream complete — remove cursor, append sources footer
                cursor.remove();
                if (pendingSources.length > 0) {
                    appendSources(aiBody, pendingSources);
                }

            } catch (err) {
                cursor.remove();
                textSpan.innerHTML = `<span class="error-msg">connection failed: ${escapeHtml(err.message)}</span>`;
            } finally {
                buttonEl.disabled = false;
                inputEl.focus();
            }
        }

        function appendSources(container, sources) {
            const footer = document.createElement('div');
            footer.className = 'sources-footer';

            const label = document.createElement('div');
            label.className = 'sources-label';
            label.textContent = 'retrieved context';
            footer.appendChild(label);

            const chips = document.createElement('div');
            sources.forEach((s, i) => {
                const chip = document.createElement('span');
                chip.className = 'source-chip';
                chip.innerHTML = `
                    <span style="color:var(--text-dim);font-size:10px;">[${i + 1}]</span>
                    <span class="chip-name">${escapeHtml(s.file_name)}</span>
                    <span class="chip-score">${s.score.toFixed(3)}</span>
                `;
                chips.appendChild(chip);
            });
            footer.appendChild(chips);
            container.appendChild(footer);
        }

        // ── Health polling ──────────────────────────────────────────
        const HEALTH_INTERVAL = 60_000; // ms between polls
        const HEALTH_TIMEOUT = 5_000;  // ms before treating as offline

        async function checkHealth() {
            const dot = document.getElementById('status-dot');
            const label = document.getElementById('status-label');
            try {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), HEALTH_TIMEOUT);
                const res = await fetch('/health', { method: 'GET', signal: controller.signal });
                clearTimeout(timer);

                if (res.ok) {
                    dot.className = 'status-dot';          // green + slow pulse
                    label.textContent = 'RAG online';
                } else {
                    dot.className = 'status-dot offline';
                    label.textContent = `degraded (${res.status})`;
                }
            } catch {
                dot.className = 'status-dot offline';
                label.textContent = 'unreachable';
            }
        }

        checkHealth();
        setInterval(checkHealth, HEALTH_INTERVAL);

        function scrollBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
