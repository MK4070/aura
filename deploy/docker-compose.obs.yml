services:
  # --------------------------------------------------------
  # Tracing & Metrics Collector: OpenTelemetry
  # --------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: aura-otel
    restart: unless-stopped
    command:
      - "--config=/etc/otel-collector-config.yaml"
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
      - "${PROMETHEUS_METRICS_ENDPOINT}:8889"
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - prometheus
    networks:
      - aura-net
    logging:
      driver: local

  # --------------------------------------------------------
  # Distributed Tracing Backend & UI: Jaeger
  # --------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: aura-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - aura-net
    logging:
      driver: local

  # --------------------------------------------------------
  # Time Series DB: Prometheus
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: aura-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aura-net
    logging:
      driver: local

  # --------------------------------------------------------
  # Visualization: Grafana
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: aura-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aura-net
    logging:
      driver: local

volumes:
  prometheus-data:
  grafana-data:

networks:
  aura-net:
    external: true